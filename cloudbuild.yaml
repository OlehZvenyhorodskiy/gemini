# Google Cloud Build — automated deployment to Cloud Run
# Builds the Docker image, pushes to Artifact Registry, and deploys
# to Cloud Run with proper secret injection and scaling settings.
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/nexus-agent/nexus-agent', '.']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/nexus-agent/nexus-agent']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nexus-agent'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/nexus-agent/nexus-agent'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--execution-environment=gen2'
      - '--timeout=3600'
      - '--concurrency=80'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--set-secrets=GOOGLE_API_KEY=${_API_KEY_SECRET}:latest'

substitutions:
  _API_KEY_SECRET: 'nexus-gemini-api-key'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/nexus-agent/nexus-agent'

options:
  logging: CLOUD_LOGGING_ONLY
